      // Solves 8x8 linear equation matrix to compute homography parameters
      function solveLinearSystem(A, B) {
        const n = 8;
        for (let i = 0; i < n; i++) {
          let maxRow = i;
          for (let k = i + 1; k < n; k++) {
            if (Math.abs(A[k][i]) > Math.abs(A[maxRow][i])) maxRow = k;
          }
          const tempRow = A[i]; A[i] = A[maxRow]; A[maxRow] = tempRow;
          const tempVal = B[i]; B[i] = B[maxRow]; B[maxRow] = tempVal;
          
          for (let k = i + 1; k < n; k++) {
            const c = -A[k][i] / A[i][i];
            for (let j = i; j < n; j++) {
              if (i === j) A[k][j] = 0;
              else A[k][j] += c * A[i][j];
            }
            B[k] += c * B[i];
          }
        }
        const x = new Array(n).fill(0);
        for (let i = n - 1; i >= 0; i--) {
          let sum = 0;
          for (let j = i + 1; j < n; j++) sum += A[i][j] * x[j];
          x[i] = (B[i] - sum) / A[i][i];
        }
        return x;
      }

      function getPerspectiveTransform(srcPts, dstPts) {
        const A = [];
        const B = [];
        for (let i = 0; i < 4; i++) {
          const sx = srcPts[i].x;
          const sy = srcPts[i].y;
          const dx = dstPts[i].x;
          const dy = dstPts[i].y;
          
          A.push([dx, dy, 1, 0, 0, 0, -dx * sx, -dy * sx]);
          B.push(sx);
          
          A.push([0, 0, 0, dx, dy, 1, -dx * sy, -dy * sy]);
          B.push(sy);
        }
        return solveLinearSystem(A, B);
      }

      function performWarp(imageSrc, corners) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.crossOrigin = "anonymous";
          img.onload = () => {
            try {
              const imgRealW = img.width;
              const imgRealH = img.height;
              
              const p0 = { x: corners[0].x * imgRealW, y: corners[0].y * imgRealH }; 
              const p1 = { x: corners[1].x * imgRealW, y: corners[1].y * imgRealH }; 
              const p2 = { x: corners[2].x * imgRealW, y: corners[2].y * imgRealH }; 
              const p3 = { x: corners[3].x * imgRealW, y: corners[3].y * imgRealH }; 
              
              const topW = Math.hypot(p1.x - p0.x, p1.y - p0.y);
              const botW = Math.hypot(p2.x - p3.x, p2.y - p3.y);
              const leftH = Math.hypot(p3.x - p0.x, p3.y - p0.y);
              const rightH = Math.hypot(p2.x - p1.x, p2.y - p1.y);
              
              const dstW = Math.round(Math.max(topW, botW));
              const dstH = Math.round(Math.max(leftH, rightH));
              
              const srcCanvas = document.createElement('canvas');
              srcCanvas.width = imgRealW;
              srcCanvas.height = imgRealH;
              const srcCtx = srcCanvas.getContext('2d');
              srcCtx.drawImage(img, 0, 0);
              const srcData = srcCtx.getImageData(0, 0, imgRealW, imgRealH);
              
              const dstCanvas = document.createElement('canvas');
              dstCanvas.width = dstW;
              dstCanvas.height = dstH;
              const dstCtx = dstCanvas.getContext('2d');
              const dstData = dstCtx.createImageData(dstW, dstH);
              
              const srcPts = [p0, p1, p2, p3];
              const dstPts = [
                { x: 0, y: 0 },
                { x: dstW, y: 0 },
                { x: dstW, y: dstH },
                { x: 0, y: dstH }
              ];
              
              const h = getPerspectiveTransform(srcPts, dstPts);
              
              for (let dy = 0; dy < dstH; dy++) {
                for (let dx = 0; dx < dstW; dx++) {
                  const den = h[6] * dx + h[7] * dy + 1;
                  const u = (h[0] * dx + h[1] * dy + h[2]) / den;
                  const v = (h[3] * dx + h[4] * dy + h[5]) / den;
                  
                  const su = Math.round(u);
                  const sv = Math.round(v);
                  
                  const dstIdx = (dy * dstW + dx) * 4;
                  
                  if (su >= 0 && su < imgRealW && sv >= 0 && sv < imgRealH) {
                    const srcIdx = (sv * imgRealW + su) * 4;
                    dstData.data[dstIdx] = srcData.data[srcIdx];
                    dstData.data[dstIdx+1] = srcData.data[srcIdx+1];
                    dstData.data[dstIdx+2] = srcData.data[srcIdx+2];
                    dstData.data[dstIdx+3] = srcData.data[srcIdx+3];
                  } else {
                    dstData.data[dstIdx] = 255;
                    dstData.data[dstIdx+1] = 255;
                    dstData.data[dstIdx+2] = 255;
                    dstData.data[dstIdx+3] = 255;
                  }
                }
              }
              
              dstCtx.putImageData(dstData, 0, 0);
              resolve(dstCanvas.toDataURL('image/png'));
            } catch (err) {
              reject(err);
            }
          };
          img.onerror = (e) => reject(e);
          img.src = imageSrc;
        });
      }

      // High-Contrast Anti-Aliasing Monochrome Soft-Threshold Filter
      function applyMonochromeBwFilter(base64Str, threshold = 165, contrastRange = 35, enabled = true) {
        if (!enabled) return Promise.resolve(base64Str);

        return new Promise((resolve, reject) => {
          const img = new Image();
          img.crossOrigin = "anonymous";
          img.onload = () => {
            try {
              const canvas = document.createElement('canvas');
              canvas.width = img.width;
              canvas.height = img.height;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0);
              
              const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
              const data = imgData.data;
              
              const transitionWidth = Math.max(5, contrastRange); 
              const lowerBound = Math.max(0, threshold - transitionWidth);
              const upperBound = Math.min(255, threshold + transitionWidth);
              
              for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i+1];
                const b = data[i+2];
                const gray = 0.299 * r + 0.587 * g + 0.114 * b;
                
                let finalVal;
                if (gray > upperBound) {
                  finalVal = 255; 
                } else if (gray < lowerBound) {
                  finalVal = Math.max(0, gray * 0.4); 
                } else {
                  const ratio = (gray - lowerBound) / (upperBound - lowerBound);
                  const darkTarget = Math.max(0, lowerBound * 0.4);
                  finalVal = darkTarget + ratio * (255 - darkTarget);
                }
                
                data[i] = finalVal;     
                data[i+1] = finalVal;   
                data[i+2] = finalVal;   
              }
              
              ctx.putImageData(imgData, 0, 0);
              resolve(canvas.toDataURL('image/png'));
            } catch (err) {
              reject(err);
            }
          };
          img.onerror = (err) => reject(err);
          img.src = base64Str;
        });
      }

        const mimeType = mimeMatch ? mimeMatch[1] : "image/png";
        const data = parts[1];
        return { data, mimeType };
      }

      async function callGeminiWithRetry(url, payload, retries = 5, delay = 1000) {
        let lastError = null;
        for (let i = 0; i < retries; i++) {
          try {
            const response = await fetch(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });
            
            if (response.ok) {
              return await response.json();
            }

            let errorMsg = `HTTP Error ${response.status}`;
            try {
              const errJson = await response.json();
              if (errJson.error?.message) {
                errorMsg = errJson.error.message;
              }
            } catch (e) {}

            if (response.status === 400 || response.status === 401 || response.status === 403) {
              throw new Error(errorMsg);
            }
            lastError = new Error(errorMsg);
          } catch (err) {
            lastError = err;
            const msg = err.message || "";
            if (msg.includes("API key") || msg.includes("not valid") || msg.includes("400") || msg.includes("403")) {
              throw err;
            }
          }
          if (i < retries - 1) {
            await new Promise(res => setTimeout(res, delay));
            delay *= 2; 
          }
        }
        throw lastError || new Error("實在頂唔住，API 連接失敗！請確認網絡或設置 Key！");
      }

      async function handlePdfUpload(e) {
        const file = e.target.files[0];
        if (!file) return;

        setPdfFile(file);
        setIsPdfLoading(true);
        setPdfPages([]);
        setSelectedPdfPageIdx(0);

        try {
          const fileReader = new FileReader();
          fileReader.onload = async function () {
            const typedarray = new Uint8Array(this.result);
            if (!window.pdfjsLib) {
              showNotification("PDF 庫加載中，請稍後...", "warning");
              setIsPdfLoading(false);
              return;
            }
            const pdf = await window.pdfjsLib.getDocument({ data: typedarray }).promise;
            const numPages = pdf.numPages;
            const pagesArray = [];

            for (let i = 1; i <= numPages; i++) {
              const page = await pdf.getPage(i);
              const viewport = page.getViewport({ scale: 1.6 });
              const canvas = document.createElement('canvas');
              const context = canvas.getContext('2d');
              canvas.height = viewport.height;
              canvas.width = viewport.width;

              await page.render({ canvasContext: context, viewport: viewport }).promise;
              const base64Img = canvas.toDataURL('image/jpeg', 0.85);
              
              pagesArray.push({
                pageNum: i,
                originalBackup: base64Img, 
                originalBase64: base64Img, 
                rawCleanedBase64: null,
                cleanedBase64: null,
                isProcessing: false,
                isDone: false,
                error: null
              });
            }
            setPdfPages(pagesArray);
            showNotification(`成功導入 PDF！總共 ${numPages} 頁。`, "success");
          };
          fileReader.readAsArrayBuffer(file);
        } catch (err) {
          showNotification("PDF 解析錯誤: " + err.message, "error");
        } finally {
          setIsPdfLoading(false);
        }
      }

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${activeKey}`;
        const promptText = getErasePromptText();

        showNotification("已開始全自動排隊處理。", "info");

        for (let i = 0; i < pdfPages.length; i++) {
          if (pdfPages[i].rawCleanedBase64) continue;
          setPdfPages(prev => prev.map((p, idx) => idx === i ? { ...p, isProcessing: true, error: null } : p));
          
          try {
            const { data: base64Data, mimeType } = getBase64DataAndMime(pdfPages[i].originalBase64);
            const imagePart = { inlineData: { data: base64Data, mimeType: mimeType } };

            const payload = {
              contents: [{ role: "user", parts: [{ text: promptText }, imagePart] }],
              generationConfig: { responseModalities: ["TEXT", "IMAGE"] }
            };

            const resultData = await callGeminiWithRetry(url, payload);
            const base64Output = resultData.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;

            if (base64Output) {
              const rawResultStr = `data:image/png;base64,${base64Output}`;
              const filteredStr = await applyMonochromeBwFilter(rawResultStr, bwThreshold, bwContrast, isMonochromeBoost);

              setPdfPages(prev => prev.map((p, idx) => idx === i ? { 
                ...p, 
                rawCleanedBase64: rawResultStr,
                cleanedBase64: filteredStr, 
                isProcessing: false, 
                isDone: true 
              } : p));
            } else {
              throw new Error("還原無效。");
            }
          } catch (err) {
            setPdfPages(prev => prev.map((p, idx) => idx === i ? { ...p, isProcessing: false, error: err.message } : p));
          }
        }
        setIsBatchProcessing(false);
        showNotification("整份 PDF 試卷批量還原完成！", "success");
      }

      async function downloadAllCleanedPages() {
        const readyPages = pdfPages.filter(p => p.cleanedBase64);
        if (readyPages.length === 0) {
          showNotification("未有已完成的頁面！", "warning");
          return;
        }
        showNotification(`準備下載 ${readyPages.length} 頁乾淨試卷。`, "info");
        for (let i = 0; i < readyPages.length; i++) {
          const page = readyPages[i];
          await new Promise(resolve => setTimeout(resolve, 350));
          downloadSingleCleanedImage(page.cleanedBase64, `${pdfFile?.name.replace('.pdf', '') || 'Pristine'}_Page_${page.pageNum}`);
        }
      }

      function getErasePromptText() {
        if (eraserMode === 'full_clean') {
          return `This is a scanned or photographed student's exam paper or worksheet. 
          It has handwritten answers, marks, ticks, crosses, circled multiple choices, and grades written in blue pen, black pen, pencil, and red pen.
          YOUR TASK: Absolutely remove and erase ALL handwritten content, handwritten text, ticks, crosses, corrections, scores, and ink/pencil marks.
          Do NOT change, blur, or remove any printed questions, original question numbers, lines, tables, borders, drawings, or text.
          Make the final output look like a pristine, completely blank, unused exam paper so a new student can do it again.
          Output ONLY the final cleaned image.`;
        } else {
          return `This is an exam paper with student answers and teacher's red corrections.
          YOUR TASK: Only detect and remove the red pen marks (teacher corrections, red ticks, red crosses, red score numbers).
          Do NOT remove the student's blue/black/pencil handwritten answers. Keep original printed texts intact.
          Output ONLY the final cleaned image with teacher red marks deleted.`;
        }
      }

      function downloadSingleCleanedImage(base64Data, pageName = 'Cleaned_Worksheet') {
        if (!base64Data) return;
        try {
          if (base64Data.startsWith('data:')) {
            const parts = base64Data.split(',');
            const mime = parts[0].match(/:(.*?);/)[1];
            const rawBase64 = parts[1];
            const binaryStr = atob(rawBase64);
            const len = binaryStr.length;
            const u8arr = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
              u8arr[i] = binaryStr.charCodeAt(i);
            }
            const blob = new Blob([u8arr], { type: mime });
            const blobUrl = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = blobUrl;
            link.download = `${pageName}.png`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            setTimeout(() => URL.revokeObjectURL(blobUrl), 200);
          }
        } catch (error) {
          openImageInNewTab(base64Data);
        }
      }

      function openImageInNewTab(base64Data) {

        try {

            `);
            newTab.document.close();

                        </div>
                      </div>

                      <div className="lg:col-span-8">
                        {pdfPages.length > 0 ? (
                          <div className="grid grid-cols-1 md:grid-cols-12 gap-4">
                            <div className="md:col-span-4 bg-slate-900 border border-slate-800 rounded-2xl p-3 h-[500px] flex flex-col">
                              <h4 className="text-xs font-bold text-slate-400 mb-2">📄 PDF 頁面清單 ({pdfPages.length} 頁)</h4>
                              <div className="flex-1 overflow-y-auto space-y-1.5 pr-1">
                                {pdfPages.map((page, idx) => (
                                  <div key={idx} onClick={() => { setSelectedPdfPageIdx(idx); setIsCropping(false); }} className={`p-2 rounded-xl border cursor-pointer flex justify-between items-center ${selectedPdfPageIdx === idx ? 'bg-indigo-600/20 border-indigo-500' : 'bg-slate-950 border-slate-800 hover:bg-slate-900'}`}>
                                    <span className="text-xs font-semibold">第 {page.pageNum} 頁</span>
                                    {page.isProcessing && <Loader2 className="w-3.5 h-3.5 animate-spin text-amber-400" />}
                                    {page.isDone && <Check className="w-3.5 h-3.5 text-emerald-400" />}
                                  </div>
                                ))}
                              </div>
                              {pdfPages.some(p => p.cleanedBase64) && (
                                <button onClick={downloadAllCleanedPages} className="w-full mt-3 py-2.5 bg-gradient-to-r from-emerald-600 to-indigo-600 text-white font-bold text-xs rounded-xl flex items-center justify-center gap-2"><FileDown className="w-4 h-4" /> 📥 下載所有已還原頁</button>
                              )}
                            </div>

                            <div ref={cropperContainerRef} onPointerMove={handleCropperPointerMove} onPointerUp={handleCropperPointerUp} onPointerCancel={handleCropperPointerUp} className="md:col-span-8 bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden flex flex-col h-[500px] touch-none">
                              <div className="px-4 py-2.5 border-b border-slate-800 bg-slate-950/40 flex justify-between items-center">
                                <span className="text-xs font-bold text-indigo-400">預覽 Page {pdfPages[selectedPdfPageIdx]?.pageNum}</span>
                                <div className="flex gap-1">
                                  <button onClick={() => { setIsCropping(!isCropping); showNotification(isCropping ? "已關閉拉直器" : "📐 四角拉直器已開啟", "info"); }} className={`p-1 px-2 rounded text-[10px] font-bold border flex items-center gap-1 ${isCropping ? 'bg-indigo-600 border-indigo-500 text-white' : 'bg-slate-850 border-slate-700 text-slate-200'}`}><Crop className="w-3.5 h-3.5" /> 拉直此頁</button>
                                  {isCropping && <button onClick={runAutoCornerDetection} className="px-2 py-0.5 bg-gradient-to-r from-emerald-600 to-indigo-600 text-white text-[9px] font-bold rounded"><Sparkles className="w-3 h-3" /> 🤖 智能自動感應</button>}
                                  {!isCropping && <button onClick={() => handleSinglePageErase(selectedPdfPageIdx)} className="p-1 px-2 rounded text-[10px] font-bold bg-gradient-to-r from-pink-600 to-purple-600 text-white shadow"><Sparkles className="w-3.5 h-3.5" /> 消除此頁筆跡</button>}
                                  <button onClick={resetToRawImage} className="p-1 px-2 rounded bg-slate-800 text-[10px] font-bold text-slate-400 border border-slate-700">重設此頁</button>
                                </div>
                              </div>

                              <div className="flex-1 p-4 flex flex-col justify-center overflow-y-auto">
                                {isCropping ? (
                                  <div className="w-full text-center space-y-4">
                                    <div className="relative inline-block select-none max-w-full overflow-hidden rounded-lg border border-indigo-500 shadow-2xl">
                                      <img src={pdfPages[selectedPdfPageIdx]?.originalBackup} className="max-h-[220px] w-auto object-contain pointer-events-none block" />
                                      <svg className="absolute inset-0 w-full h-full">
                                        <polygon points={`${cropPoints[0].x*100}%,${cropPoints[0].y*100}% ${cropPoints[1].x*100}%,${cropPoints[1].y*100}% ${cropPoints[2].x*100}%,${cropPoints[2].y*100}% ${cropPoints[3].x*100}%,${cropPoints[3].y*100}%`} fill="rgba(99, 102, 241, 0.2)" stroke="#6366f1" strokeWidth="2.5" strokeDasharray="4 2" />
                                        {cropPoints.map((pt, idx) => (
                                          <circle key={idx} cx={`${pt.x * 100}%`} cy={`${pt.y * 100}%`} r="11" fill="#ffffff" stroke="#6366f1" strokeWidth="3" className="hover:scale-125 transition-transform" onPointerDown={(e) => handleCropperPointerDown(e, idx)} onPointerUp={handleCropperPointerUp} onPointerCancel={handleCropperPointerUp} />
                                        ))}
                                      </svg>
                                    </div>
                                    <div>
                                      <button onClick={executePerspectiveWarp} className="px-4 py-2 bg-indigo-600 text-white text-xs font-bold rounded-lg shadow inline-flex items-center gap-1.5"><Maximize className="w-3.5 h-3.5" /> 裁切、拉直並自動還原</button>
                                    </div>
                                  </div>
                                ) : (
                                  <div className="grid grid-cols-2 gap-3 h-full">
                                    <div className="flex flex-col h-full">
                                      <span className="text-[10px] font-bold text-center text-slate-400 bg-slate-950 py-1 rounded">原卷 (第 {pdfPages[selectedPdfPageIdx]?.pageNum} 頁)</span>
                                      <div className="flex-1 bg-slate-950 rounded-lg p-2 border border-slate-800 mt-1 flex items-center justify-center overflow-hidden">
                                        <img src={pdfPages[selectedPdfPageIdx]?.originalBase64} className="max-h-60 rounded object-contain" />
                                      </div>
                                    </div>
                                    <div className="flex flex-col h-full">
                                      <span className="text-[10px] font-bold text-center text-indigo-400 bg-indigo-500/10 border border-indigo-500/15 py-1 rounded">乾淨卷</span>
                                      <div className="flex-1 bg-slate-950 rounded-lg p-2 border border-slate-800 mt-1 flex items-center justify-center overflow-hidden relative">
                                        {pdfPages[selectedPdfPageIdx]?.cleanedBase64 ? (
                                          <img src={pdfPages[selectedPdfPageIdx]?.cleanedBase64} className="max-h-60 rounded object-contain" />
                                        ) : pdfPages[selectedPdfPageIdx]?.isProcessing ? (
                                          <div className="text-center space-y-2"><Loader2 className="w-8 h-8 text-pink-500 animate-spin mx-auto" /><p className="text-[10px] text-slate-400">還原中...</p></div>
                                        ) : (
                                          <span className="text-[10px] text-slate-500">等候還原</span>
                                        )}
                                      </div>
                                    </div>
                                  </div>
                                )}
                              </div>
                            </div>
                          </div>
                        ) : (
                          <div className="bg-slate-900 border border-slate-800 rounded-2xl h-full min-h-[440px] flex flex-col justify-center items-center text-slate-600"><FileText className="w-16 h-16 text-slate-800 mb-2 animate-pulse" /><p className="text-sm font-bold">請在左邊導入 PDF...</p></div>
                        )}
                      </div>
                    </div>
                  )}
                </div>
              )}

              {activeTab === 'dashboard' && (
                <div className="space-y-6">
                  <div className="relative overflow-hidden rounded-3xl bg-gradient-to-r from-indigo-900 via-indigo-950 to-slate-900 border border-indigo-500/20 p-6 md:p-8 shadow-2xl">
                    <div className="absolute top-0 right-0 w-64 h-64 bg-indigo-500/10 rounded-full blur-3xl"></div>
                    <div className="relative z-10 max-w-xl space-y-3">
                      <span className="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-indigo-500/20 text-indigo-300 text-xs font-semibold"><Sparkles className="w-3.5 h-3.5" /> 2026 最新 AI 還原技術</span>
                      <h2 className="text-2xl md:text-3xl font-extrabold text-white">喂 {userProfile.name}，今日想操邊份試卷？</h2>
                      <p className="text-slate-300 text-sm leading-relaxed">支持單張截圖 或 **整套多頁 PDF** 一鍵對齊拉直、消除手寫筆跡！</p>
                      <button onClick={() => { setActiveTab('eraser'); setEraserSourceMode('pdf'); }} className="flex items-center gap-2 px-5 py-2.5 rounded-xl bg-gradient-to-r from-pink-600 to-indigo-600 text-white font-bold text-sm hover:brightness-110 active:scale-95 transition-all"><RefreshCw className="w-4 h-4 animate-spin-slow" /> 導入 PDF 批量消筆跡</button>
                    </div>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div className="bg-slate-900/50 border border-slate-800 rounded-2xl p-5 space-y-2"><div className="w-10 h-10 rounded-lg bg-indigo-500/10 flex items-center justify-center"><Crop className="w-5 h-5 text-indigo-400" /></div><h4 className="font-bold text-white">3D 四角拉直</h4><p className="text-xs text-slate-400">手機歪斜拍照一鍵對齊，秒變完美 A4 標準印本比例。</p></div>
                    <div className="bg-slate-900/50 border border-slate-800 rounded-2xl p-5 space-y-2"><div className="w-10 h-10 rounded-lg bg-pink-500/10 flex items-center justify-center"><RefreshCw className="w-5 h-5 text-pink-400" /></div><h4 className="font-bold text-white">工業級黑白增強</h4><p className="text-xs text-slate-400">自動抹除筆跡，高對比度純黑白渲染，列印超級慳墨。</p></div>
                    <div className="bg-slate-900/50 border border-slate-800 rounded-2xl p-5 space-y-2"><div className="w-10 h-10 rounded-lg bg-emerald-500/10 flex items-center justify-center"><CheckCircle className="w-5 h-5 text-emerald-400" /></div><h4 className="font-bold text-white">純前端安全隱私</h4><p className="text-xs text-slate-400">所有數據本地傳輸處理，完全保障孩子學習私隱。</p></div>
                  </div>
                </div>
              )}

              {activeTab === 'scan' && (
                <div className="space-y-6">
                  <div className="flex items-center justify-between">
                    <div>
                      <h2 className="text-xl font-bold flex items-center gap-2"><Camera className="w-5 h-5 text-indigo-400" /> 智能拍照解題</h2>
                      <p className="text-xs text-slate-400">直接上傳題目照，AI 化身最強老友導師幫你一步步拆解！</p>
                    </div>
                  </div>
                  <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                    <div className="lg:col-span-5 space-y-4">
                      <div className="border-2 border-dashed border-slate-800 rounded-2xl p-6 bg-slate-900/30 flex flex-col items-center justify-center text-center cursor-pointer relative min-h-[220px]">
                        <input type="file" accept="image/*" onChange={(e) => { const file = e.target.files[0]; if (file) { setSelectedImage(file); const reader = new FileReader(); reader.onloadend = () => setImagePreview(reader.result); reader.readAsDataURL(file); } }} className="absolute inset-0 opacity-0 cursor-pointer" />
                        {imagePreview ? <img src={imagePreview} className="max-h-40 mx-auto rounded-lg object-contain shadow-md" /> : <div className="space-y-2"><Upload className="w-10 h-10 text-slate-700 mx-auto" /><p className="text-xs">點擊或拖放上載題目圖片</p></div>}
                      </div>
                      <div className="space-y-2">
                        <label className="text-xs font-bold text-slate-400">解題說明（選填）：</label>
                        <textarea value={scanPrompt} onChange={(e) => setScanPrompt(e.target.value)} className="w-full h-24 text-xs bg-slate-900 border border-slate-800 rounded-xl p-3 focus:outline-none text-slate-100 placeholder-slate-600 resize-none leading-relaxed" />
                      </div>
                      <button onClick={handleScanSolve} disabled={isScanning || !selectedImage} className="w-full py-3.5 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold text-xs rounded-xl flex items-center justify-center gap-2 shadow">{isScanning ? <Loader2 className="w-4 h-4 animate-spin" /> : <Sparkles className="w-3.5 h-3.5" />} AI 極速解題</button>
                    </div>
                    <div className="lg:col-span-7">
                      <div className="bg-slate-900 border border-slate-800 rounded-2xl h-full min-h-[400px] flex flex-col overflow-hidden">
                        <div className="px-4 py-3 border-b border-slate-800 bg-slate-950/40"><span className="text-xs font-bold text-slate-400 uppercase tracking-wider">解答結果：</span></div>
                        <div className="flex-1 p-5 overflow-y-auto space-y-4 text-sm leading-relaxed text-slate-200">
                          {isScanning ? (
                            <div className="h-full flex flex-col items-center justify-center text-center py-20"><Loader2 className="w-8 h-8 text-indigo-500 animate-spin mb-2" /><p className="text-xs text-slate-400">AI 正在瘋狂解題中...</p></div>
                          ) : scanResult ? (
                            <div className="whitespace-pre-wrap select-text">{scanResult}</div>
                          ) : (
                            <div className="text-center py-24 text-slate-600"><HelpCircle className="w-12 h-12 mx-auto mb-2 text-slate-800" /><p className="text-xs">上載題目照，解答將實時展示於此。</p></div>
                          )}
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {activeTab === 'chat' && (
                <div className="space-y-4 max-w-4xl mx-auto">
                  <div className="bg-slate-900 border border-slate-800 rounded-2xl h-[480px] flex flex-col overflow-hidden shadow-xl">
                    <div className="flex-1 p-4 overflow-y-auto space-y-4 select-text">
                      {chatMessages.map((msg) => (
                        <div key={msg.id} className={`flex gap-3 max-w-[85%] ${msg.role === 'user' ? 'ml-auto flex-row-reverse' : ''}`}>
                          <div className={`w-8 h-8 rounded-lg shrink-0 flex items-center justify-center text-xs font-bold ${msg.role === 'user' ? 'bg-indigo-600 text-white' : 'bg-slate-850 text-indigo-400 border border-slate-700'}`}>{msg.role === 'user' ? <User className="w-4 h-4" /> : <Brain className="w-4 h-4" />}</div>
                          <div className="space-y-1">
                            <div className={`p-3 rounded-2xl text-xs md:text-sm leading-relaxed whitespace-pre-wrap ${msg.role === 'user' ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-slate-950 text-slate-200 border border-slate-800 rounded-tl-none'}`}>{msg.text}</div>
                          </div>
                        </div>
                      ))}
                      {isChatTyping && <div className="flex gap-3"><Loader2 className="w-5 h-5 animate-spin text-indigo-400" /></div>}
                      <div ref={chatEndRef} />
                    </div>
                    <div className="p-3 border-t border-slate-800 bg-slate-950/40 flex items-center gap-2">
                      <input type="text" value={chatInput} onChange={(e) => setChatInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleSendMessage()} placeholder="輸入你想問導師嘅問題..." className="flex-1 bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-xs md:text-sm text-slate-100 placeholder-slate-600 focus:outline-none transition-all" />
                      <button onClick={handleSendMessage} disabled={isChatTyping || !chatInput.trim()} className="p-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl"><Send className="w-4 h-4" /></button>
                    </div>
                  </div>
                </div>
              )}

              {activeTab === 'settings' && (
                <div className="space-y-6 max-w-2xl mx-auto">
                  <div className="bg-slate-900 border border-slate-800 rounded-2xl p-5 space-y-4 shadow-xl">
                    <div className="flex items-center gap-2 text-indigo-400 font-bold text-sm"><Sparkles className="w-4 h-4" /> Gemini API 金鑰 (選填)</div>
                    <p className="text-xs text-slate-400">數據將儲存於你瀏覽器的 LocalStorage 入面，保證安全！</p>
                    <input type="password" value={userKey} onChange={(e) => saveKey(e.target.value)} placeholder="AI_zaSy..." className="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-xs md:text-sm text-slate-100 focus:outline-none focus:border-indigo-500 transition-all" />
                  </div>
                </div>
              )}
            </main>
          </div>
          <footer className="bg-slate-950 border-t border-slate-900 py-3 text-center text-[10px] text-slate-600">© 2026 AI Homework军师 App • 試卷消除筆跡自用尊享版 • Powered by Gemini 2.5 Flash</footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
